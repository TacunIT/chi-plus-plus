  java: "I suspect that the root of many of the differences between C/C++ and Java is that AT&T is primarily a user (a consumer) of computers, languages, and tools, whereas Sun is primarily a vendor of such things."
tao:
  # TODO: sostituire con una traduzione pubblicata del Tao Te Ching
  # (es. Legge, Feng/English) invece di questa ritraduzione.
  deporre: "For all things flourish, and (then) each returns to its own root.<br />Returning to one's root is called stillness; this means laying down one's task.<br />Laying down one's task is a constant law.<br />One who knows this constant law is called enlightened.<br />One who does not know this constant law acts foolishly and brings misfortune upon himself."
