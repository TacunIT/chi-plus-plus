agostino: "And I considered all the things that are beneath you, and I saw that one cannot say, absolutely, either that they exist or that they do not: in their own way they exist, because they come from you; they do not exist, because they are not what you are: and what truly exists is that which remains unchanging."
asimov:
  'Eliminate all the wonderful things that human imagination has created out of nothing; we must draw out everything possible from the flat reality we hear and see.<br />
  <span class="autore">Isaac Asimov</span> - Extraterrestrial Civilizations'
attar: "I saw my Lord with the eye of the heart.<br />I asked him: Who are you?<br />He answered: You!"
coomaraswamy:
  vedanta: 'The declared aim of Kanāda in the Vaiśeṣika Sūtras, considered by Dasgupta to be pre-Buddhist, is to explain the Dharma (the Eternal Law) as the foundation, on the one hand, of manifestation (abhyudaya) and, on the other, of the "Highest Good" (niḥśreyasam), that is, of Liberation: the validity of the Vedas is established by the fact that these are their aims.'
corano:
  VII-14-18: 'He [Iblis] said: "Grant me respite until the day when mankind is resurrected." The Lord answered: "You are granted respite until that day." And Iblis said further: "Since You have caused me to err, I will lie in wait for them on Your Straight Path! And I will come upon them from before them and behind them, from their right and their left! And You will not find most of them grateful to You." And God said: "Get out of here, banished and rejected! As for those of them who follow you, I will fill Hell with all of you!"'
croce:
  testo: "A system is a house that, as soon as it is built and furnished, needs (subject as it is to the corroding action of the elements) a more or less vigorous but constant work of maintenance, and that at a certain point it is no longer worth restoring and propping up, and it must be torn down and rebuilt from the foundations. But with this crucial difference: that, in the work of thought, the house is perpetually new and perpetually sustained by the old one, which, as if by magic, endures within it."
dawkins:
  # TODO: Dawkins ha scritto in inglese. Queste sono ritraduzioni dall'italiano
  # e vanno sostituite con le sue frasi originali non appena trovate.
  tempo: "Given infinite time, or an infinite number of opportunities, anything is possible."
  analogia: "One of the marks of foolish extravagance is an overly enthusiastic use of analogy."
deen:
  testo: "Change begins when you set out on a new path, even if that path is nothing more than a track left by a thirsty goat that found a spring."
eckart:
  conoscenza: "As long as the soul does not know everything there is to know, it cannot attain the good."
fois:
  scacchi: "How the game of chess was born: two Indian princes, Gav and Talhend, were fighting over the kingdom, even though their mother begged them to share it like good brothers. The two could not manage it, and their quarrel turned into a bloody war, which was finally won by Gav, in which Talhend lost his life. Their mother, desperate, asked her surviving son to recount to her, blow by blow, how the battle between them had unfolded, and in order to explain it all to her in detail, Gav created a board and had little figures of towers, horses, and soldiers carved in wood, thereby laying the foundations of the game of chess."
gita:
  caos: "At the end of its own cycle of existence, a world collapses in on itself, reabsorbing every form of manifestation — living beings and inanimate objects alike — into a dark mass, where they lie latent in a chaotic condition."
  cicli: "The cosmic cycles are time-periods called Manvantara, each subdivided internally into four eras or Yugas, each characterized by a particular quality of existence. It is a periodic return to conditions of life that are not identical but analogous, from a qualitative point of view, to those of the preceding cycles — a succession of four eras that echoes, on a smaller scale, the alternation of the four seasons."
  dualismo: "Sāṃkhya, the doctrine on which Yoga is founded, speaks of two principles which, interacting with one another, manifest the entire universe along with all the living beings and inanimate objects that populate it: Prakṛti, the material and feminine pole, and Puruṣa, the spiritual and masculine one; in the human being, Prakṛti constitutes the body and mind, which become the dwelling place of the individual soul (puruṣa)."
  vasana:
    "There are two categories of saṃskāra; the first consists of the vāsanā, impressions left in the mind by past events, traces kept here in a latent state but ready to manifest in the presence of suitable conditions — that is, of situations similar to those that generated them, which would activate them because of their affinity.
    Driven by the vāsanā, once activated, and by the states of mind these manifest, the individual displays an unconscious tendency to act in a certain way, and more generally to have a certain kind of behavior, sensitivity, character; it is an innate predisposition that leads them, for better or worse, toward behavior similar to what they exhibited in the past, creating a vicious (or virtuous) circle that feeds on itself."
  azione: "You have a right to action alone, never to its fruits: let not the fruit of action be your motive, nor let there be in you any attachment to inaction."
guenon:
  # TODO: Guénon scriveva in francese; anche l'italiano è già una traduzione.
  # Questa versione inglese è quindi una traduzione di terza mano.
  spirito: "The true traditional spirit, whatever the form it takes, is at bottom always and everywhere the same; the different forms, specifically adapted to these or those mental conditions, to these or those circumstances of time and place, are only the expressions of one and the same truth."
  filosofi: 'It even seems that philosophers care far more about posing "problems" — however artificial and illusory they may be — than about solving them: this is one aspect of the disordered need for research for its own sake, that is, the vainest agitation, no less in the mental order than in the bodily one. These same philosophers are also concerned with attaching their name to a "system" — that is, to a strictly delimited set of theories that is their own and signifies nothing but their own work. Hence the desire to be original at any cost, even if truth must be sacrificed to such originality. For a philosopher''s reputation, inventing a new error is worth far more than repeating a truth already expressed by others. This form of individualism, to which so many mutually contradictory (if not self-contradictory) "systems" are owed, is nonetheless found in equal measure among modern scientists and artists. But it is perhaps among philosophers that the intellectual anarchy which is its inevitable consequence stands out most clearly.'
  verita:
    testo: 'A true idea cannot be "new", since truth is not a product of the human mind — it exists independently of us, and we have only to come to know it.'
mantiq:
  male: "O Creator, whatever evil or good I did,<br />in truth I did it only to myself."
  tutto:
    "Everything is a single substance in countless forms, everything is a single discourse in different expressions (...)
    He escapes all explanation, any attribute. Of Him only a pale idea is granted us; to give a full account of Him is impossible. However well or ill one speaks of Him, in reality one speaks of nothing but oneself."
mulino-amleto:
  # TODO: da sostituire con il testo originale inglese di Hamlet's Mill
  # (De Santillana / von Dechend, 1969) non appena reperito.
  mito: 'Mythical figures, it is true, are born and pass away, but not quite as we mortals do. They need characteristic names, like that of "The Once and Future King". Did they exist in the past? Then they existed even earlier, or will exist again, under other names, in other guises, just as the sky brings back its configurations to us eternally. If one tried to define them precisely as persons and things, they would surely vanish before our eyes, like the fruits of a sick fancy. But if their true nature is respected, they will reveal that nature as functions.'
  mito-funzioni: 'Mythical figures, it is true, are born and pass away, but not quite as we mortals do. They need characteristic names, like that of "The Once and Future King". Did they exist in the past? Then they existed even earlier, or will exist again, under other names, in other guises, just as the sky brings back its configurations to us eternally. If one tried to define them precisely as persons and things, they would surely vanish before our eyes, like the fruits of a sick fancy. But if their true nature is respected, they will reveal that nature as functions.'
  mulo: '"When I close my eyes I see only the backside of a mule, and when I don''t close them, I see the same." In a sense, this is today''s view of reality.<br/><span class="autore">G. de Santillana, H. von Dechend</span> - Hamlet''s Mill'
  stoltezza: "There is a good rule for historians that I have always kept in mind while working on my <i>Galileo</i>: never underestimate the power of foolishness and senselessness in human affairs."
  una-sostanza: 'When he attributes feelings and thoughts to clay vessels, he does not do so as a literary trope, but in the awareness that all transient things are prisoners of the same transmutation, that substance is one, and that vessels, men, and dreams are made of it. One might call it a living reality; it differs in a singular way from ordinary or objective reality. When the poet imagines that this very brick might be the clay that once was Kay Khusraw, he echoes Hamlet''s meditation in the graveyard: "To what base uses we may return, Horatio! Why may not imagination trace the noble dust of Alexander, till he find it stopping a bung-hole?"'
kernigan: "The only way to learn a new programming language is by writing programs in it."
musashi:
  cinque-anelli:
    regole: "<ul>
      <li>Do not think dishonestly.
      <li>The Way is in training.
      <li>Become acquainted with every art.
      <li>Know the Ways of all professions.
      <li>Distinguish between gain and loss in worldly matters.
      <li>Develop intuitive judgment and understanding for everything.
      <li>Perceive those things which cannot be seen.
      <li>Pay attention even to trifles.
      <li>Do not do anything useless."
    carpentiere: "To build a house, materials must be carefully selected. For the outer pillars, straight and knot-free timber should be chosen, while for the inner ones, straight timber with minor defects may be used. For thresholds, lintels, fittings, and sliding doors, the finest-looking wood should be used, even if not too sturdy, and so on. For structural parts, visual appearance matters less than robustness. Lower-grade timber with many knots is used instead for scaffolding and, in the end, is burned."
  dokkodo: "<ul>
    <li>Accept everything just the way it is.
    <li>Do not seek pleasure for its own sake.
    <li>Do not, under any circumstances, depend on a partial feeling.
    <li>Think lightly of yourself and deeply of the world.
    <li>Be detached from desire your whole life long.
    <li>Do not regret what you have done.
    <li>Never be jealous.
    <li>Never let yourself be saddened by a separation.
    <li>Resentment and complaint are appropriate neither for oneself nor others.
    <li>Do not let yourself be guided by the feeling of lust or love.
    <li>In all things have no preferences.
    <li>Be indifferent to where you live.
    <li>Do not pursue the taste of good food.
    <li>Do not hold on to possessions you no longer need.
    <li>Do not act following customary beliefs.
    <li>Do not collect weapons or practice with weapons beyond what is useful.
    <li>Do not fear death.
    <li>Do not seek to possess either goods or fiefs for your old age.
    <li>Respect Buddha and the Gods without counting on their help.
    <li>You may abandon your own body but you must preserve your honour.
    <li>Never stray from the Way."
  novel: "One must not interfere with the workings of the Universe, but first one must understand what the workings of the Universe are"
platone:
  # TODO: sostituire con una traduzione inglese pubblicata del Fedone
  # (es. Jowett, Grube) invece di questa ritraduzione dall'italiano.
  fedone: "Those who have committed offenses that are forgivable, though serious — as, for example, one who in a fit of anger did violence to his father or mother and then repented and lived the rest of his life accordingly; or one who became a murderer for some other similar reason and likewise repented — such people must, of necessity, plunge into Tartarus, but then, after a year has passed there since their fall, the tide casts them out again, the murderers along the Cocytus, those who struck father or mother along the Pyriphlegethon; and when, carried by these streams, they reach the level of the Acherusian marsh, there they cry out and call upon those they killed, or those to whom they did violence, and, calling them by name, they beg and beseech to be allowed out into the marsh and to be received; and if they persuade them, they come out and thus have rest from their sufferings; if not, they are carried back once more into Tartarus, and from Tartarus back once more into the rivers, and they never cease suffering this back-and-forth until they have persuaded those they wronged: for this is the penalty imposed on them by those judges."
rg-veda:
  # TODO: sostituire con una traduzione pubblicata del Nasadiya Sukta.
  creazione: "In that moment there was neither death nor immortality.<br />There was no sign of night, nor of day.<br />The One breathed, breathless, by its own power.<br />Beyond that there was nothing else.<br />"
straulino:
  testo: "When you're racing and there's no wind, don't go looking for it.<br /> Point the bow in the right direction and wait: the wind will come."
stroustrup:
  # TODO: verificare la formulazione esatta di Stroustrup per "cpp"
