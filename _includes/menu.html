<nav class="menu-top">
    <a
        title="{{ site.data.strings[page.lang].vai_a }}: {{page.previous.title}}"
        {%
        if
        page.previous
        %}
        href="{{page.previous.url}}"
        class="left freccia"
        {%
        else
        %}
        href="Javascript:void(0);"
        class="left freccia inattivo"
        {%
        endif
        %}
    >
        <i class="fa fa-chevron-left fa-2x" aria-hidden="true"></i>
    </a>
    <a
        href="/"
        class="center"
        title="{{ site.data.strings[page.lang].torna_home }}"
    >
        <i class="fa fa-home fa-2x" aria-hidden="true"></i>
    </a>
    <a
        title="{{ site.data.strings[page.lang].menu_indice_title }}"
        href="{{ site.data.strings[page.lang].href_toc }}"
    >
        <i class="fa fa-bars fa-2x" aria-hidden="true"></i>
    </a>
    {% assign lang_corrente = page.lang | default: 'it' %} {% assign
    altra_lingua = "en" %} {% if lang_corrente == "en" %}{% assign altra_lingua
    = "it" %}{% endif %} {% assign pagina_gemella = site[altra_lingua] | where:
    "translation_reference", page.translation_reference | first %}
    <a
        {%
        if
        pagina_gemella
        %}
        href="{{ pagina_gemella.url }}"
        {%
        else
        %}
        href="/{{ altra_lingua }}/"
        {%
        endif
        %}
        class="center"
        title="{{ site.data.strings[lang_corrente].leggi_altra_lingua }}"
    >
        <i class="fa fa-globe fa-2x" aria-hidden="true"></i>
    </a>
    <a
        href="{{ site.url_github }}"
        target="github"
        class="center"
        title="{{ site.data.strings[page.lang].vai_a_github }}"
    >
        <i class="fab fa-github fa-2x" aria-hidden="true"></i>
    </a>
    <a
        title="{{ site.data.strings[page.lang].vai_a }}: {{page.next.title}}"
        {%
        if
        page.next
        %}
        href="{{page.next.url}}"
        {%
        else
        %}
        href="/{{ page.lang }}/"
        {%
        endif
        %}
        class="right freccia"
    >
        <i class="fa fa-chevron-right fa-2x" aria-hidden="true"></i>
    </a>
</nav>
